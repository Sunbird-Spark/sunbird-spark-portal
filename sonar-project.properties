sonar.projectKey=SunbirdEd-portal
sonar.organization=sunbird-ed

sonar.sourceEncoding=UTF-8

# Source code
sonar.sources=frontend/src,backend/src

# Identify test files
sonar.test.inclusions=**/*.spec.ts,**/*.spec.tsx,**/*.test.ts,**/*.test.tsx

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**

# Coverage exclusions
sonar.coverage.exclusions=**/*.spec.ts,**/*.spec.tsx,**/*.test.ts,**/*.test.tsx,**/*.mock.ts,**/*.config.ts,**/*.config.js

# Coverage reports
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,backend/coverage/lcov.info
